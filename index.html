<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>인기팀 뭐먹지? 🍽️</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
/* --- 기존 스타일 유지 --- */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0f0f1a;--bg2:#161628;--bg3:#1e1e35;--bg4:#252540;
  --acc:#ff6b6b;--acc2:#ffd93d;--acc3:#6bcb77;--acc4:#4d96ff;
  --text:#f0f0f8;--text2:#9090b0;--text3:#505070;
  --border:rgba(255,255,255,0.07);
  --r:16px;--rs:10px;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;overflow-x:hidden}
.nav{position:fixed;bottom:0;left:0;right:0;background:var(--bg2);border-top:1px solid var(--border);display:flex;z-index:50;padding-bottom:env(safe-area-inset-bottom)}
.nav-btn{flex:1;padding:12px 4px 10px;background:none;border:none;color:var(--text3);font-size:11px;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer}
.nav-btn.active{color:var(--acc)}
.page{display:none;padding:0 16px 120px;max-width:480px;margin:0 auto}
.page.active{display:block}
.page-header{padding:40px 0 20px;text-align:center}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:12px}
.session-card{background:linear-gradient(135deg,var(--bg3),var(--bg4));border:1px solid rgba(255,107,107,0.2);border-radius:var(--r);padding:20px;margin-bottom:16px;text-align:center}
.btn{padding:12px;border-radius:var(--rs);border:none;font-size:14px;font-weight:500;cursor:pointer;transition:0.2s}
.btn-primary{background:var(--acc);color:white}
.btn-success{background:var(--acc3);color:#0f1a10}
.btn-blue{background:var(--acc4);color:white}
.btn-full{width:100%;display:block;margin-top:8px}
.vote-item{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px;margin-bottom:10px;cursor:pointer}
.vote-bar-wrap{margin-top:10px;height:4px;background:var(--bg4);border-radius:2px}
.vote-bar{height:4px;border-radius:2px;background:var(--acc);transition:width 0.5s ease}
.inp{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:var(--rs);padding:12px;color:var(--text);margin-bottom:10px;outline:none}
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(100px);background:var(--bg4);padding:10px 20px;border-radius:30px;transition:0.3s;z-index:100;opacity:0}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}
.member-chip{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:25px;background:var(--bg3);margin:4px;cursor:pointer;border:1px solid var(--border);transition:0.2s;font-size:13px}
.member-chip.active{background:var(--acc);border-color:var(--acc);box-shadow:0 4px 12px rgba(255,107,107,0.3)}
.order-list{font-size:13px;text-align:left;background:rgba(255,255,255,0.03);padding:12px;border-radius:var(--rs);margin-top:10px}
.order-item{display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid rgba(255,255,255,0.05)}
</style>
</head>
<body>

<nav class="nav">
  <button class="nav-btn active" onclick="showPage('vote')">🗳️<span>투표</span></button>
  <button class="nav-btn" onclick="showPage('menu')">🍱<span>메뉴</span></button>
  <button class="nav-btn" onclick="showPage('restaurant')">🏠<span>식당</span></button>
  <button class="nav-btn" onclick="showPage('team')">👥<span>팀원</span></button>
</nav>

<div class="page active" id="page-vote">
  <div class="page-header"><h1>인기팀 뭐먹지? 🍽️</h1></div>
  
  <div class="session-card" id="sessionBoard">
    <div id="sessionType" style="font-size:11px;color:var(--acc2);margin-bottom:4px">READY</div>
    <div id="sessionTitle" style="font-size:22px;font-weight:700;margin-bottom:8px">진행 중인 투표 없음</div>
    <div id="voteSummary" style="font-size:13px;color:var(--text2)">상단 버튼을 눌러 투표를 시작하세요</div>
    <div id="orderBoard" style="display:none; margin-top:15px; border-top:1px dashed var(--border); padding-top:10px;">
        <div style="font-size:12px; color:var(--acc4); margin-bottom:8px; font-weight:bold;">📋 실시간 주문 명단 (1순위 기준)</div>
        <div id="orderListContent" class="order-list"></div>
    </div>
  </div>

  <div class="card">
    <div style="font-size:12px;color:var(--text2);margin-bottom:8px">내 캐릭터 선택</div>
    <div id="memberPicker" style="display:flex;flex-wrap:wrap;justify-content:center"></div>
  </div>

  <div id="voteList"></div>

  <div class="card" style="margin-top:20px">
    <input class="inp" id="sessionTitleInput" value="오늘 점심" placeholder="투표 제목">
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
      <button class="btn btn-success" onclick="startRestVote()">🏠 식당투표 시작</button>
      <button class="btn btn-blue" onclick="startMenuVoteFromWinner()">🍱 메뉴투표 전환</button>
    </div>
    <button class="btn btn-full" style="background:var(--bg3);color:var(--text2)" onclick="endSession()">■ 투표 종료 (최종 확정)</button>
  </div>
</div>

<div class="page" id="page-menu"><div class="page-header"><h1>메뉴 관리 🍱</h1></div><div id="fullMenuList"></div></div>
<div class="page" id="page-restaurant"><div class="page-header"><h1>식당 관리 🏠</h1></div><div id="fullRestList"></div></div>
<div class="page" id="page-team"><div class="page-header"><h1>팀원 관리 👥</h1></div><div id="fullMemberList"></div></div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
import { getDatabase, ref, set, onValue, push, remove } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js';

const firebaseConfig = {
  apiKey: "AIzaSyAzsKX2cDvdgTE3CXi8fiv3iQS-djAd1eo",
  authDomain: "inkiteam-lunch.firebaseapp.com",
  databaseURL: "https://inkiteam-lunch-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "inkiteam-lunch",
  storageBucket: "inkiteam-lunch.firebasestorage.app",
  appId: "1:114564991030:web:09d3049122cb3e25407097"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let myName = localStorage.getItem('inkiteam_name') || '';
let currentSession = null;
let allMembers = {};
let allRestaurants = {};
let allRestMenus = {};
let allVotes = {};

onValue(ref(db, 'members'), s => { allMembers = s.val() || {}; renderMemberPicker(); });
onValue(ref(db, 'restaurants'), s => { allRestaurants = s.val() || {}; });
onValue(ref(db, 'restMenus'), s => { allRestMenus = s.val() || {}; renderVoteList(); });
onValue(ref(db, 'session'), s => { currentSession = s.val(); updateSessionUI(); renderVoteList(); });
onValue(ref(db, 'votes'), s => { allVotes = s.val() || {}; updateSessionUI(); renderVoteList(); });

// 초기 데이터 (기존 19개 식당 및 팀원 정보 유지)
async function initApp() {
  const members = { 
    m1:{name:'남', emoji:'👩‍💼'}, m2:{name:'정', emoji:'👦'}, m3:{name:'고', emoji:'👩‍🦱'}, 
    m4:{name:'완', emoji:'🧐'}, m5:{name:'슬', emoji:'🤓'}, m6:{name:'류', emoji:'👩‍🦳'}, 
    m7:{name:'빈', emoji:'🧐'}, m8:{name:'전', emoji:'👩'}, m9:{name:'태', emoji:'👧'}
  };
  await set(ref(db, 'members'), members);
  // (식당/메뉴 데이터 생략 - 실제 반영 시 이전의 19개 식당 데이터를 여기에 넣으세요)
}
initApp();

window.showPage = (id) => {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('page-'+id).classList.add('active');
  const idx = ['vote', 'menu', 'restaurant', 'team'].indexOf(id);
  document.querySelectorAll('.nav-btn')[idx].classList.add('active');
};

window.selectName = (n) => { myName = n; localStorage.setItem('inkiteam_name', n); renderMemberPicker(); renderVoteList(); };

window.startRestVote = () => {
  const title = document.getElementById('sessionTitleInput').value || '오늘 점심';
  set(ref(db, 'session'), { title, type: 'restaurant', status: 'active' });
  set(ref(db, 'votes'), null);
};

window.startMenuVoteFromWinner = () => {
  const scores = calculateScores();
  const winner = Object.entries(scores).sort((a,b) => b[1]-a[1])[0];
  if(!winner) return toast('식당을 먼저 투표해주세요!');
  const winnerId = winner[0];
  const winnerName = allRestaurants[winnerId]?.name;
  set(ref(db, 'session'), { title: `🍱 ${winnerName}`, type: 'menu', winnerRestId: winnerId, status: 'active' });
  set(ref(db, 'votes'), null);
};

window.castVote = (id) => {
  if(!myName) return toast('캐릭터를 선택하세요!');
  const myVKey = Object.keys(allVotes).find(k => allVotes[k].voter === myName) || push(ref(db, 'votes')).key;
  const data = allVotes[myVKey] || { voter: myName };
  if(data.rank1 === id) delete data.rank1;
  else if(!data.rank1) data.rank1 = id;
  else if(data.rank2 === id) delete data.rank2;
  else if(!data.rank2) data.rank2 = id;
  set(ref(db, `votes/${myVKey}`), data);
};

window.endSession = () => {
  if(!currentSession) return;
  set(ref(db, 'session/status'), 'finished');
  toast('투표가 종료되었습니다.');
};

function calculateScores() {
  const scores = {};
  Object.values(allVotes).forEach(v => {
    if(v.rank1) scores[v.rank1] = (scores[v.rank1] || 0) + 3;
    if(v.rank2) scores[v.rank2] = (scores[v.rank2] || 0) + 2;
  });
  return scores;
}

function updateSessionUI() {
  const s = currentSession;
  const elTitle = document.getElementById('sessionTitle');
  const elType = document.getElementById('sessionType');
  const elSummary = document.getElementById('voteSummary');
  const elOrderBoard = document.getElementById('orderBoard');
  const elOrderContent = document.getElementById('orderListContent');
  
  if(!s) {
    elType.textContent = 'READY'; elTitle.textContent = '진행 중인 투표 없음';
    elSummary.innerHTML = '투표를 시작해주세요.';
    elOrderBoard.style.display = 'none';
    return;
  }

  elType.textContent = s.status === 'finished' ? 'COMPLETED' : (s.type === 'restaurant' ? 'STEP 1: 식당 투표' : 'STEP 2: 메뉴 투표');
  elTitle.textContent = s.title;

  // 메뉴 투표 단계이거나 종료된 경우 명단 표시
  if(s.type === 'menu') {
    elOrderBoard.style.display = 'block';
    const voteEntries = Object.values(allVotes);
    if(voteEntries.length > 0) {
      elOrderContent.innerHTML = voteEntries.map(v => {
        const m = Object.values(allMembers).find(mem => mem.name === v.voter);
        const menuName = allRestMenus[s.winnerRestId][v.rank1]?.name || '선택 중...';
        return `<div class="order-item"><span>${m?.emoji}${v.voter}</span> <span>${menuName}</span></div>`;
      }).join('');
      elSummary.innerHTML = `현재 <b>${voteEntries.length}명</b> 참여 중`;
    } else {
      elOrderContent.innerHTML = '<div style="text-align:center; color:var(--text3)">아직 주문 내역이 없습니다.</div>';
    }
  } else {
    elOrderBoard.style.display = 'none';
    elSummary.innerHTML = `가고 싶은 식당을 투표해주세요.`;
  }

  if(s.status === 'finished') {
    elType.textContent = '🎉 투표 종료';
    elSummary.innerHTML = '주문 명단을 확인하여 주문을 진행하세요!';
  }
}

function renderVoteList() {
  const el = document.getElementById('voteList');
  if(!currentSession || currentSession.status === 'finished') return el.innerHTML = '';
  
  let items = currentSession.type === 'menu' ? (allRestMenus[currentSession.winnerRestId] || {}) : allRestaurants;
  const scores = calculateScores();
  const sorted = Object.entries(items).sort((a,b) => (scores[b[0]]||0) - (scores[a[0]]||0));
  const max = Math.max(...Object.values(scores), 1);

  el.innerHTML = sorted.map(([id, it]) => {
    const s = scores[id] || 0;
    const choosers = Object.values(allVotes)
      .filter(v => v.rank1 === id || v.rank2 === id)
      .map(v => Object.values(allMembers).find(m => m.name === v.voter)?.emoji || '')
      .join('');
    const isMy = Object.values(allVotes).find(v => v.voter === myName && (v.rank1 === id || v.rank2 === id));

    return `
      <div class="vote-item" onclick="castVote('${id}')" style="border-color:${isMy?'var(--acc)':'var(--border)'}">
        <div style="display:flex;justify-content:space-between">
          <div><b>${it.name}</b> <span style="font-size:12px;color:var(--acc2)">${s}점</span><br>
          <div style="margin-top:4px">${choosers}</div></div>
          <div style="font-size:20px">${it.emoji || '🍽️'}</div>
        </div>
        <div class="vote-bar-wrap"><div class="vote-bar" style="width:${(s/max)*100}%"></div></div>
      </div>`;
  }).join('');
}

function renderMemberPicker() {
  document.getElementById('memberPicker').innerHTML = Object.values(allMembers).map(m => `
    <div class="member-chip ${myName===m.name?'active':''}" onclick="selectName('${m.name}')">
      <span>${m.emoji}</span> ${m.name}
    </div>
  `).join('');
}

function toast(m) {
  const t = document.getElementById('toast');
  t.textContent = m; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}
</script>
</body>
</html>
