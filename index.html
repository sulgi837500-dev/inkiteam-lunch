<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>인기팀 뭐먹지? 🍽️</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Mono:wght@500&display=swap" rel="stylesheet">
<style>
/* 기존 CSS 스타일 유지 */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0f0f1a;--bg2:#161628;--bg3:#1e1e35;--bg4:#252540;
  --acc:#ff6b6b;--acc2:#ffd93d;--acc3:#6bcb77;--acc4:#4d96ff;
  --text:#f0f0f8;--text2:#9090b0;--text3:#505070;
  --border:rgba(255,255,255,0.07);
  --r:16px;--rs:10px;--rxs:6px;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;overflow-x:hidden}
.nav{position:fixed;bottom:0;left:0;right:0;background:var(--bg2);border-top:1px solid var(--border);display:flex;z-index:50;padding-bottom:env(safe-area-inset-bottom)}
.nav-btn{flex:1;padding:12px 4px 10px;background:none;border:none;color:var(--text3);font-size:10px;display:flex;flex-direction:column;align-items:center;gap:3px}
.nav-btn.active{color:var(--acc)}
.page{display:none;padding:0 16px 100px;max-width:480px;margin:0 auto}
.page.active{display:block}
.page-header{padding:48px 0 20px;text-align:center}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:12px}
.session-card{background:linear-gradient(135deg,var(--bg3),var(--bg4));border:1px solid rgba(255,107,107,0.2);border-radius:var(--r);padding:20px;margin-bottom:16px;position:relative}
.btn{padding:10px 18px;border-radius:var(--rs);border:none;font-size:13px;font-weight:500;cursor:pointer;transition:all 0.2s}
.btn-primary{background:var(--acc);color:white}
.btn-success{background:var(--acc3);color:#0f1a10}
.btn-blue{background:var(--acc4);color:white}
.btn-full{width:100%;padding:14px;font-size:15px}
.vote-item{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px;margin-bottom:10px;cursor:pointer}
.vote-bar-wrap{margin-top:10px;height:4px;background:var(--bg4);border-radius:2px}
.vote-bar{height:4px;border-radius:2px;background:var(--acc);transition:width 0.5s ease}
.inp{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:var(--rs);padding:10px 14px;color:var(--text);margin-bottom:10px}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(100px);background:var(--bg4);padding:10px 20px;border-radius:30px;transition:0.3s;z-index:100;opacity:0}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}
</style>
</head>
<body>

<nav class="nav">
  <button class="nav-btn active" onclick="showPage('vote')">🗳️투표</button>
  <button class="nav-btn" onclick="showPage('menu')">🍱메뉴</button>
  <button class="nav-btn" onclick="showPage('restaurant')">🏠식당</button>
  <button class="nav-btn" onclick="showPage('team')">👥팀원</button>
</nav>

<div class="page active" id="page-vote">
  <div class="page-header">
    <h1>인기팀 뭐먹지? 🍽️</h1>
    <p id="voteSubtitle">오늘의 메뉴를 정해보세요</p>
  </div>

  <div class="session-card">
    <div id="sessionType" style="font-size:11px;color:var(--acc2);margin-bottom:5px">READY</div>
    <div class="session-title" id="sessionTitle" style="font-size:22px;font-weight:700">진행 중인 투표 없음</div>
    <div class="session-status" id="sessionStatus" style="font-size:13px;color:var(--text2);margin-top:5px">식당 투표를 먼저 시작해주세요</div>
  </div>

  <div class="card" id="nameCard">
    <div style="font-size:12px;color:var(--text2);margin-bottom:8px">내 이름 선택</div>
    <div style="display:flex;gap:8px;flex-wrap:wrap" id="memberPicker"></div>
  </div>

  <div id="voteList"></div>

  <div class="card" style="margin-top:20px">
    <input class="inp" id="sessionTitleInput" value="오늘 점심" placeholder="투표 제목">
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
      <button class="btn btn-success" onclick="window.startRestVote()">🏠 식당투표 시작</button>
      <button class="btn btn-blue" onclick="window.startMenuVoteFromWinner()">🍱 메뉴투표 전환</button>
    </div>
    <button class="btn btn-secondary btn-full" style="margin-top:8px;background:var(--bg3);color:var(--text2)" onclick="window.endSession()">■ 투표 종료</button>
  </div>
</div>

<div class="page" id="page-menu">... (생략) ...</div>
<div class="page" id="page-restaurant">... (생략) ...</div>
<div class="page" id="page-team">... (생략) ...</div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
import { getDatabase, ref, set, get, onValue, push, remove } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js';

const firebaseConfig = {
  // 사용자의 Firebase 설정 정보 유지
  apiKey: "AIzaSyAzsKX2cDvdgTE3CXi8fiv3iQS-djAd1eo",
  authDomain: "inkiteam-lunch.firebaseapp.com",
  databaseURL: "https://inkiteam-lunch-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "inkiteam-lunch",
  storageBucket: "inkiteam-lunch.firebasestorage.app",
  appId: "1:114564991030:web:09d3049122cb3e25407097"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let myName = localStorage.getItem('inkiteam_name') || '';
let currentSession = null;
let allMembers = {};
let allRestaurants = {};
let allRestMenus = {};
let allVotes = {};

// 데이터 실시간 동기화
onValue(ref(db, 'members'), s => { allMembers = s.val() || {}; renderMemberPicker(); });
onValue(ref(db, 'restaurants'), s => { allRestaurants = s.val() || {}; });
onValue(ref(db, 'restMenus'), s => { allRestMenus = s.val() || {}; });
onValue(ref(db, 'session'), s => { currentSession = s.val(); updateSessionUI(); renderVoteList(); });
onValue(ref(db, 'votes'), s => { allVotes = s.val() || {}; renderVoteList(); });

// 세션 UI 업데이트
function updateSessionUI() {
  const s = currentSession;
  document.getElementById('sessionType').textContent = s ? (s.type === 'restaurant' ? 'STEP 1: 식당 투표' : 'STEP 2: 메뉴 투표') : 'READY';
  document.getElementById('sessionTitle').textContent = s ? s.title : '진행 중인 투표 없음';
  document.getElementById('sessionStatus').textContent = s ? (s.type === 'restaurant' ? '가고 싶은 식당을 골라주세요' : '메뉴를 골라주세요') : '관리자가 투표를 시작해야 합니다';
}

// 투표 리스트 렌더링 (핵심 로직)
function renderVoteList() {
  const el = document.getElementById('voteList');
  if (!currentSession) { el.innerHTML = ''; return; }

  // 세션 타입에 따라 아이템 결정
  let items = {};
  if (currentSession.type === 'menu' && currentSession.winnerRestId) {
    items = allRestMenus[currentSession.winnerRestId] || {}; // 1위 식당의 메뉴만 가져옴
  } else {
    items = allRestaurants; // 식당 투표 시 전체 식당 리스트
  }

  const entries = Object.entries(items);
  if (!entries.length) { el.innerHTML = '<div style="text-align:center;padding:40px;color:var(--text3)">등록된 정보가 없습니다.</div>'; return; }

  // 점수 계산
  const scores = {};
  Object.values(allVotes).forEach(v => {
    if (v.rank1) scores[v.rank1] = (scores[v.rank1] || 0) + 3;
    if (v.rank2) scores[v.rank2] = (scores[v.rank2] || 0) + 2;
    if (v.rank3) scores[v.rank3] = (scores[v.rank3] || 0) + 1;
  });

  const sorted = entries.sort((a,b) => (scores[b[0]]||0) - (scores[a[0]]||0));
  const maxScore = Math.max(...Object.values(scores), 1);

  el.innerHTML = sorted.map(([id, it]) => {
    const s = scores[id] || 0;
    const p = (s / maxScore) * 100;
    return `
      <div class="vote-item" onclick="window.castVote('${id}')">
        <div style="display:flex;justify-content:space-between;align-items:center">
          <div>
            <div style="font-weight:700">${it.name}</div>
            <div style="font-size:12px;color:var(--acc2)">${it.price ? Number(it.price).toLocaleString() + '원' : it.desc || ''}</div>
          </div>
          <div style="font-size:24px">${it.emoji || '🍽️'}</div>
        </div>
        <div class="vote-bar-wrap"><div class="vote-bar" style="width:${p}%"></div></div>
        <div style="font-size:11px;color:var(--text3);margin-top:5px">${s}점 획득</div>
      </div>
    `;
  }).join('');
}

// 식당 투표 시작
window.startRestVote = async function() {
  const title = document.getElementById('sessionTitleInput').value || '오늘 점심';
  await set(ref(db, 'session'), { title, type: 'restaurant', startedAt: Date.now() });
  await set(ref(db, 'votes'), null);
  toast('🏠 식당 투표가 시작되었습니다!');
};

// 메뉴 투표로 전환 (1위 식당 자동 매칭)
window.startMenuVoteFromWinner = async function() {
  const scores = {};
  Object.values(allVotes).forEach(v => {
    if (v.rank1) scores[v.rank1] = (scores[v.rank1] || 0) + 3;
    if (v.rank2) scores[v.rank2] = (scores[v.rank2] || 0) + 2;
    if (v.rank3) scores[v.rank3] = (scores[v.rank3] || 0) + 1;
  });

  const winner = Object.entries(scores).sort((a,b) => b[1] - a[1])[0];
  if (!winner) { toast('먼저 식당 투표를 진행해주세요!'); return; }

  const winnerId = winner[0];
  const winnerName = allRestaurants[winnerId].name;

  await set(ref(db, 'session'), {
    title: `🍱 메뉴 선정: ${winnerName}`,
    type: 'menu',
    winnerRestId: winnerId, // 1위 식당 ID 저장
    startedAt: Date.now()
  });
  await set(ref(db, 'votes'), null); // 투표 초기화
  toast(`${winnerName} 메뉴 투표 시작!`);
};

window.castVote = async function(id) {
  if (!myName) { toast('이름을 먼저 선택해주세요!'); return; }
  const myV = Object.entries(allVotes).find(([k, v]) => v.voter === myName);
  const key = myV ? myV[0] : push(ref(db, 'votes')).key;
  const data = myV ? myV[1] : { voter: myName };

  if (data.rank1 === id) delete data.rank1;
  else if (!data.rank1) data.rank1 = id;
  else if (data.rank2 === id) delete data.rank2;
  else if (!data.rank2) data.rank2 = id;
  else if (data.rank3 === id) delete data.rank3;
  else if (!data.rank3) data.rank3 = id;
  else { toast('최대 3개까지 선택 가능합니다!'); return; }

  await set(ref(db, `votes/${key}`), data);
};

window.endSession = () => set(ref(db, 'session'), null);

function renderMemberPicker() {
  const el = document.getElementById('memberPicker');
  el.innerHTML = Object.values(allMembers).map(m => `
    <button onclick="window.selectName('${m.name}')" style="padding:6px 12px;border-radius:20px;border:1px solid var(--border);background:${myName===m.name?'var(--acc)':'var(--bg3)'};color:white">
      ${m.name}
    </button>
  `).join('');
}

window.selectName = (n) => { myName = n; localStorage.setItem('inkiteam_name', n); renderMemberPicker(); };
function showPage(id) { document.querySelectorAll('.page').forEach(p => p.classList.remove('active')); document.getElementById('page-'+id).classList.add('active'); }
function toast(m) { const t = document.getElementById('toast'); t.textContent = m; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2000); }
window.showPage = showPage;
</script>
</body>
</html>
