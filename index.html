<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>인기팀 뭐먹지? 🍽️</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
/* --- 디자인 시스템 --- */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0f0f1a;--bg2:#161628;--bg3:#1e1e35;--bg4:#252540;
  --acc:#ff6b6b;--acc2:#ffd93d;--acc3:#6bcb77;--acc4:#4d96ff;
  --text:#f0f0f8;--text2:#9090b0;--text3:#505070;
  --border:rgba(255,255,255,0.07);
  --r:16px;--rs:10px;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;overflow-x:hidden}
.nav{position:fixed;bottom:0;left:0;right:0;background:var(--bg2);border-top:1px solid var(--border);display:flex;z-index:50;padding-bottom:env(safe-area-inset-bottom)}
.nav-btn{flex:1;padding:12px 4px 10px;background:none;border:none;color:var(--text3);font-size:11px;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer}
.nav-btn.active{color:var(--acc)}
.page{display:none;padding:0 16px 140px;max-width:480px;margin:0 auto}
.page.active{display:block}
.page-header{padding:40px 0 20px;text-align:center}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:12px}
.session-card{background:linear-gradient(135deg,var(--bg3),var(--bg4));border:1px solid rgba(255,107,107,0.2);border-radius:var(--r);padding:20px;margin-bottom:16px;text-align:center}
.btn{padding:12px;border-radius:var(--rs);border:none;font-size:14px;font-weight:500;cursor:pointer;transition:0.2s}
.btn-success{background:var(--acc3);color:#0f1a10}
.btn-blue{background:var(--acc4);color:white}
.btn-full{width:100%;display:block;margin-top:8px}
.vote-item{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px;margin-bottom:10px;cursor:pointer}
.vote-bar-wrap{margin-top:10px;height:4px;background:var(--bg4);border-radius:2px}
.vote-bar{height:4px;border-radius:2px;background:var(--acc);transition:width 0.5s ease}
.inp{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:var(--rs);padding:12px;color:var(--text);margin-bottom:10px;outline:none}
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(100px);background:var(--bg4);padding:10px 20px;border-radius:30px;transition:0.3s;z-index:100;opacity:0}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}
.member-chip{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:25px;background:var(--bg3);margin:4px;cursor:pointer;border:1px solid var(--border);transition:0.2s;font-size:13px}
.member-chip.active{background:var(--acc);border-color:var(--acc);box-shadow:0 4px 12px rgba(255,107,107,0.3)}
.coffee-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:15px}
.coffee-btn{padding:12px 8px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--rs);color:var(--text);font-size:12px;cursor:pointer;text-align:center;line-height:1.2}
.coffee-btn:active{background:var(--acc4)}
.list-item{display:flex;justify-content:space-between;align-items:center;padding:12px;border-bottom:1px solid var(--border)}
.menu-group{margin-bottom:20px; border-left: 3px solid var(--acc4); padding-left: 10px;}
</style>
</head>
<body>

<nav class="nav">
  <button class="nav-btn active" onclick="showPage('vote')">🗳️<span>투표</span></button>
  <button class="nav-btn" onclick="showPage('coffee')">☕<span>커피</span></button>
  <button class="nav-btn" onclick="showPage('menu')">🍱<span>메뉴</span></button>
  <button class="nav-btn" onclick="showPage('restaurant')">🏠<span>식당</span></button>
  <button class="nav-btn" onclick="showPage('team')">👥<span>팀원</span></button>
</nav>

<div class="page active" id="page-vote">
  <div class="page-header"><h1>인기팀 뭐먹지? 🍽️</h1></div>
  <div class="session-card" id="sessionBoard">
    <div id="sessionType" style="font-size:11px;color:var(--acc2);margin-bottom:4px">READY</div>
    <div id="sessionTitle" style="font-size:22px;font-weight:700;margin-bottom:8px">진행 중인 투표 없음</div>
    <div id="voteSummary" style="font-size:13px;color:var(--text2)">캐릭터를 선택하고 투표를 시작하세요</div>
    <div id="orderBoard" style="display:none; margin-top:15px; border-top:1px dashed var(--border); padding-top:10px;">
        <div style="font-size:12px; color:var(--acc4); margin-bottom:8px; font-weight:bold;">📋 실시간 메뉴 주문 명단</div>
        <div id="orderListContent" style="text-align:left; font-size:13px; background:rgba(255,255,255,0.03); padding:10px; border-radius:10px;"></div>
    </div>
  </div>
  <div class="card">
    <div style="font-size:12px;color:var(--text2);margin-bottom:8px">내 캐릭터 선택</div>
    <div id="memberPicker" style="display:flex;flex-wrap:wrap;justify-content:center"></div>
  </div>
  <div id="voteList"></div>
  <div class="card" style="margin-top:20px">
    <input class="inp" id="sessionTitleInput" value="수요일 점심" placeholder="투표 제목">
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
      <button class="btn btn-success" onclick="startRestVote()">🏠 식당투표 시작</button>
      <button class="btn btn-blue" onclick="startMenuVoteFromWinner()">🍱 메뉴투표 전환</button>
    </div>
    <button class="btn btn-full" style="background:var(--bg3);color:var(--text2);margin-top:10px" onclick="endSession()">■ 투표 종료 (결과 확정)</button>
  </div>
</div>

<div class="page" id="page-coffee">

  </div>
  <div class="card">

        <button class="coffee-btn" onclick="orderCoffee('핫 카페모카')">🔥 핫 모카</button>
        <button class="coffee-btn" onclick="orderCoffee('아이스 시그니처')">❄️ 아이스 시그니처</button>
        <button class="coffee-btn" onclick="orderCoffee('핫 시그니처')">🔥 핫 시그니처</button>
      </div>
    </div>
    <div style="margin-bottom:20px">
      <div style="font-size:13px; font-weight:bold; margin-bottom:10px; color:var(--acc3);">[ 디카페인 ]</div>

        <button class="coffee-btn" onclick="orderCoffee('핫 디카페인 라떼')">🔥 디카 라떼(H)</button>

        <button class="coffee-btn" onclick="orderCoffee('핫 디카페인 바닐라')">🔥 디카 바닐라(H)</button>
        <button class="coffee-btn" onclick="orderCoffee('아이스 디카페인 모카')">❄️ 디카 모카(I)</button>

      </div>
    </div>
    <div style="border-top:1px solid var(--border); padding-top:15px;">
      <input class="inp" id="customCoffeeInput" placeholder="에이드, 티 등 직접 입력">
      <button class="btn btn-blue btn-full" onclick="orderCustomCoffee()">그 외 메뉴 주문하기</button>
    </div>
  </div>
</div>

<div class="page" id="page-menu"><div class="page-header"><h1>전체 메뉴판 🍱</h1></div><div id="fullMenuList"></div></div>
<div class="page" id="page-restaurant"><div class="page-header"><h1>식당 목록 🏠</h1></div><div id="fullRestList"></div></div>
<div class="page" id="page-team"><div class="page-header"><h1>우리 팀원 👥</h1></div><div id="fullMemberList"></div></div>

    r16:{ m1:{name:'돌솥추어탕',price:'10000'}, m2:{name:'돌솥밥 통추어탕',price:'12000'}, m3:{name:'추어튀김 대',price:'15000'}, m4:{name:'추어튀김 소',price:'8000'}, m5:{name:'고추장추어탕 대',price:'42000'}, m6:{name:'돌솥밥우렁추어탕',price:'12000'} },
    r17:{ m1:{name:'얼큰수제비국보리밥',price:'9000'}, m2:{name:'맑은수제비국보리밥',price:'9000'}, m3:{name:'닭곰탕',price:'9000'}, m4:{name:'냉콩국수',price:'9000'}, m5:{name:'보쌈1접시',price:'12000'} },
    r18:{ m1:{name:'일반초밥',price:'12000'}, m2:{name:'회덮밥',price:'9000'}, m3:{name:'구월정식',price:'18000'}, m4:{name:'알밥',price:'9000'} },
    r19:{ m1:{name:'회덮밥',price:'8000'}, m2:{name:'나가사끼짬뽕',price:'9000'}, m3:{name:'등심돈카스',price:'9000'}, m4:{name:'매운탕&알밥',price:'10000'} }
  };
  await set(ref(db, 'restMenus'), menus);
}
initApp();

// --- 화면 제어 ---
window.showPage = (id) => {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('page-'+id).classList.add('active');
  const idx = ['vote', 'coffee', 'menu', 'restaurant', 'team'].indexOf(id);
  document.querySelectorAll('.nav-btn')[idx].classList.add('active');
};

// --- 투표 로직 ---
window.selectName = (n) => { myName = n; localStorage.setItem('inkiteam_name', n); renderMemberPicker(); };
window.startRestVote = () => { set(ref(db, 'session'), { title: document.getElementById('sessionTitleInput').value || '오늘 점심', type: 'restaurant', status: 'active' }); set(ref(db, 'votes'), null); };
window.startMenuVoteFromWinner = () => {
  const scores = calculateScores();
  const winner = Object.entries(scores).sort((a,b) => b[1]-a[1])[0];
  if(!winner) return toast('식당을 먼저 투표하세요!');
  set(ref(db, 'session'), { title: `🍱 ${allRestaurants[winner[0]].name}`, type: 'menu', winnerRestId: winner[0], status: 'active' });
  set(ref(db, 'votes'), null);
};
window.castVote = (id) => {
  if(!myName) return toast('캐릭터를 고르세요!');
  const myVKey = Object.keys(allVotes).find(k => allVotes[k].voter === myName) || push(ref(db, 'votes')).key;
  const data = allVotes[myVKey] || { voter: myName };
  if(data.rank1 === id) delete data.rank1; else if(!data.rank1) data.rank1 = id; else if(data.rank2 === id) delete data.rank2; else if(!data.rank2) data.rank2 = id;
  set(ref(db, `votes/${myVKey}`), data);
};
window.endSession = () => { if(currentSession) set(ref(db, 'session/status'), 'finished'); };

function calculateScores() {
  const scores = {};
  Object.values(allVotes).forEach(v => { if(v.rank1) scores[v.rank1] = (scores[v.rank1] || 0) + 3; if(v.rank2) scores[v.rank2] = (scores[v.rank2] || 0) + 2; });
  return scores;
}

// --- 커피 주문 로직 ---
window.orderCoffee = (menuName) => { if(!myName) return toast('캐릭터를 고르세요!'); set(ref(db, `coffeeOrders/${myName}`), { menu: menuName }); };
window.orderCustomCoffee = () => { const input = document.getElementById('customCoffeeInput'); if(!input.value) return; orderCoffee(input.value); input.value = ''; };
window.resetCoffee = () => { if(confirm('주문을 초기화할까요?')) set(ref(db, 'coffeeOrders'), null); };

// --- 렌더링 함수 ---
function updateSessionUI() {
  const s = currentSession;
  const elTitle = document.getElementById('sessionTitle');
  const elType = document.getElementById('sessionType');
  const elSummary = document.getElementById('voteSummary');
  const elOrderBoard = document.getElementById('orderBoard');
  const elOrderContent = document.getElementById('orderListContent');
  
  if(!s) { elType.textContent = 'READY'; elTitle.textContent = '진행 중인 투표 없음'; elSummary.innerHTML = '투표를 시작하세요.'; elOrderBoard.style.display = 'none'; return; }
  elType.textContent = s.status === 'finished' ? '🎉 투표 종료' : (s.type === 'restaurant' ? 'STEP 1: 식당 투표' : 'STEP 2: 메뉴 투표');
  elTitle.textContent = s.title;

  if(s.type === 'menu') {
    elOrderBoard.style.display = 'block';
    const vEntries = Object.values(allVotes);
    elOrderContent.innerHTML = vEntries.length > 0 ? vEntries.map(v => {
      const m = Object.values(allMembers).find(mem => mem.name === v.voter);
      const mObj = allRestMenus[s.winnerRestId][v.rank1] || {name:'선택 중...', price:'0'};
      return `<div style="display:flex; justify-content:space-between; margin-bottom:4px;"><span>${m?.emoji}${v.voter}</span> <span>${mObj.name} (${Number(mObj.price).toLocaleString()}원)</span></div>`;
    }).join('') : '내역 없음';
  } else { elOrderBoard.style.display = 'none'; }
}

function renderVoteList() {
  const el = document.getElementById('voteList');
  if(!currentSession || currentSession.status === 'finished') return el.innerHTML = '';
  let items = currentSession.type === 'menu' ? (allRestMenus[currentSession.winnerRestId] || {}) : allRestaurants;
  const scores = calculateScores();
  const sorted = Object.entries(items).sort((a,b) => (scores[b[0]]||0) - (scores[a[0]]||0));
  const max = Math.max(...Object.values(scores), 1);
  el.innerHTML = sorted.map(([id, it]) => {
    const s = scores[id] || 0;
    const ch = Object.values(allVotes).filter(v => v.rank1 === id || v.rank2 === id).map(v => Object.values(allMembers).find(m => m.name === v.voter)?.emoji || '').join('');
    const isMy = Object.values(allVotes).find(v => v.voter === myName && (v.rank1 === id || v.rank2 === id));
    const pTxt = (currentSession.type === 'menu' && it.price) ? `<small style="color:var(--text3)">(${Number(it.price).toLocaleString()}원)</small>` : '';
    return `<div class="vote-item" onclick="castVote('${id}')" style="border-color:${isMy?'var(--acc)':'var(--border)'}">
      <div style="display:flex;justify-content:space-between"><div><b>${it.name}</b> ${pTxt} <span style="font-size:12px;color:var(--acc2);margin-left:8px;">${s}점</span><div style="margin-top:4px">${ch}</div></div><div style="font-size:20px">${it.emoji || '🍽️'}</div></div>
      <div class="vote-bar-wrap"><div class="vote-bar" style="width:${(s/max)*100}%"></div></div>
    </div>`;
  }).join('');
}

function renderCoffeeOrders() {
  const elList = document.getElementById('coffeeOrderList');
  const elTotal = document.getElementById('coffeeTotalCount');
  const vEntries = Object.entries(coffeeOrders);
  if(vEntries.length === 0) { elList.innerHTML = '내역 없음'; elTotal.innerHTML = '대기 중...'; return; }
  
  elList.innerHTML = vEntries.map(([name, data]) => {
    const m = Object.values(allMembers).find(mem => mem.name === name);
    return `<div style="display:flex; justify-content:space-between; padding:4px 0; border-bottom:1px solid rgba(255,255,255,0.05);"><span>${m?.emoji || ''} <b>${name}</b></span><span style="color:var(--acc4)">${data.menu}</span></div>`;
  }).join('');
  
  const sum = {}; vEntries.forEach(([n, d]) => sum[d.menu] = (sum[d.menu] || 0) + 1);
  elTotal.innerHTML = Object.entries(sum).map(([m, c]) => `• ${m}: <b>${c}잔</b>`).join('<br>');
}

function renderMemberPicker() { document.getElementById('memberPicker').innerHTML = Object.values(allMembers).map(m => `<div class="member-chip ${myName===m.name?'active':''}" onclick="selectName('${m.name}')"><span>${m.emoji}</span> ${m.name}</div>`).join(''); }
function renderRestList() { document.getElementById('fullRestList').innerHTML = Object.entries(allRestaurants).map(([id, r]) => `<div class="card list-item"><span>${r.emoji} <b>${r.name}</b></span></div>`).join(''); }
function renderFullMenuList() { document.getElementById('fullMenuList').innerHTML = Object.entries(allRestaurants).map(([rid, r]) => `<div class="menu-group"><div style="font-weight:700; color:var(--acc2);">${r.emoji} ${r.name}</div>${Object.values(allRestMenus[rid]||{}).map(m => `<div style="display:flex; justify-content:space-between; font-size:13px;"><span>${m.name}</span><span>${Number(m.price).toLocaleString()}원</span></div>`).join('')}</div>`).join(''); }
function renderTeamList() { document.getElementById('fullMemberList').innerHTML = Object.values(allMembers).map(m => `<div class="card list-item"><span>${m.emoji} <b>${m.name}</b></span></div>`).join(''); }
function toast(m) { const t = document.getElementById('toast'); t.textContent = m; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2000); }
</script>
</body>
